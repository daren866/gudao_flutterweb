name: Build and Release Flutter Android App (Debug)

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project source
        run: dart analyze

      - name: Build Android Debug APK
        run: flutter build apk --debug

      - name: Get package info
        id: package_info
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1 | tr -d ' ')
          if [ -z "$VERSION" ]; then
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              VERSION=${GITHUB_REF#refs/tags/}
            else
              VERSION="${GITHUB_SHA:0:7}"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Final version: $VERSION"

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk app-debug-${{ steps.package_info.outputs.version }}.apk
          echo "APK ready: app-debug-${{ steps.package_info.outputs.version }}.apk"

      - name: Create Release and Upload APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-debug-${{ steps.package_info.outputs.version }}.apk
          name: Debug Build ${{ steps.package_info.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## 🚀 Flutter Android Debug APK
            
            - **版本**: ${{ steps.package_info.outputs.version }}
            - **构建时间**: ${{ github.event.head_commit.timestamp || '手动触发' }}
            - **构建类型**: Debug
            
            > ⚠️ 这是 Debug 版本，仅供测试使用，请勿发布到应用商店
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ steps.package_info.outputs.version }}
          path: app-debug-${{ steps.package_info.outputs.version }}.apk
